<!DOCTYPE html>
<html>
<head>

<title>Priyanka | Cyber Security Graduate</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

/* Background */

body{
    margin:0;
    font-family: Arial;
    background:#020617;
    color:white;
}

/* Hero Section */

.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    flex-direction:column;
    background: radial-gradient(circle at center,#0f172a,#020617);
}

.hero h1{
    font-family:'Orbitron', sans-serif;
    font-size:60px;
    color:#38bdf8;
    margin:0;
}

.hero p{
    max-width:600px;
    margin-top:25px;
    line-height:1.6;
}

/* Button */

.btn{
    margin-top:35px;
    padding:15px 35px;
    background:#38bdf8;
    color:black;
    border-radius:10px;
    text-decoration:none;
    transition:0.4s;
}

.btn:hover{
    transform:scale(1.08);
}

/* Floating Animation */

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-18px);}
    100%{transform:translateY(0px);}
}

.hero-content{
    animation:float 5s ease-in-out infinite;
}

/* Scroll Fade */

.fade{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

</style>

</head>

<body>

<section class="hero">

<div class="hero-content fade">

<h1>Priyanka</h1>

<p>
Cyber Security Graduate | SOC Monitoring | Network Security | SIEM Analysis<br><br>

Master of Information Technology graduate passionate about security operations,
threat detection, and infrastructure protection.
</p>

<a class="btn" href="#projects">Explore My Work</a>

</div>

</section>


<script>

/* Animation Trigger */

const elements = document.querySelectorAll(".fade");

window.addEventListener("scroll", ()=>{

elements.forEach(el=>{
    const pos = el.getBoundingClientRect().top;

    if(pos < window.innerHeight - 120){
        el.classList.add("show");
    }
});

});

</script>

</body>
</html>
